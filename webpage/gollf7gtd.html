<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VW Golf 7 GTD</title>

<style>
body{
	margin:0;
	font-family: 'Segoe UI', sans-serif;
	background:#0f172a;
	color:white;
}

/* NAVBAR */
header{
	display:flex;
	justify-content:space-between;
	padding:20px 40px;
	background:#020617;
	position:sticky;
	top:0;
	z-index:1000;
}

header a{
	color:white;
	text-decoration:none;
	margin:0 10px;
	font-weight:500;
}

header a:hover{
	color:#22c55e;
}

/* HERO */
.hero{
	height:70vh;
	background:url("images-golf7-gtd/gtd.jpg") center/cover no-repeat;
	display:flex;
	align-items:end;
	padding:40px;
	position:relative;
}

.hero::after{
	content:"";
	position:absolute;
	inset:0;
	background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.hero-content{
	position:relative;
}

.hero h1{
	font-size:40px;
	margin:0;
}

.price{
	font-size:28px;
	color:#22c55e;
	margin-top:10px;
}

/* CONTAINER */
.container{
	max-width:1100px;
	margin:30px auto;
	padding:20px;
}

/* GALLERY */
.gallery{
	display:grid;
	grid-template-columns:repeat(4,1fr);
	gap:10px;
}

.gallery img{
	width:100%;
	height:120px;
	object-fit:cover;
	border-radius:10px;
	cursor:pointer;
	transition:0.3s;
}

.gallery img:hover{
	transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
	position:fixed;
	inset:0;
	background:rgba(0,0,0,0.9);
	display:none;
	align-items:center;
	justify-content:center;
	z-index:2000;
}

.lightbox img{
	max-width:90%;
	max-height:90%;
	border-radius:10px;
}

/* DETAILS */
.details{
	display:grid;
	grid-template-columns:1fr 1fr;
	gap:20px;
	margin-top:20px;
}

.card{
	background:#020617;
	padding:20px;
	border-radius:12px;
}

.card h3{
	color:#22c55e;
}

table{
	width:100%;
	border-collapse:collapse;
}

td{
	padding:10px;
	border-bottom:1px solid #1e293b;
}

/* BUTTON */
.sticky-btn{
	position:fixed;
	bottom:20px;
	left:50%;
	transform:translateX(-50%);
	background:#22c55e;
	color:black;
	padding:15px 30px;
	border-radius:50px;
	font-weight:bold;
	text-decoration:none;
	box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.sticky-btn:hover{
	background:#16a34a;
}

/* RESPONSIVE */
@media(max-width:768px){
	.details{
		grid-template-columns:1fr;
	}

	.hero h1{
		font-size:28px;
	}
}
</style>
</head>

<body>

<header>
	<div><strong>Auto Sumea</strong></div>
	<div>
		<a href="index.html">Kryefaqja</a>
		<a href="about.html">Rreth Nesh</a>
		<a href="contact.html">Kontakt</a>
	</div>
</header>

<!-- HERO -->
<div class="hero">
	<div class="hero-content">
		<h1>Volkswagen Golf 7 GTD</h1>
		<div class="price">17,500 €</div>
	</div>
</div>

<div class="container">

	<!-- GALLERY -->
	<div class="gallery">
		<img src="imagesgollf7gtd/golf.jpg.jpg" onclick="openImg(this)">
		<img src="imagesgollf7gtd/back.jpg.jpg" onclick="openImg(this)">
		<img src="imagesgollf7gtd/side.jpg.jpg" onclick="openImg(this)">
		<img src="imagesgollf7gtd/interior.jpg.jpg" onclick="openImg(this)">
	</div>

	<!-- DETAILS -->
	<div class="details">

		<div class="card">
			<h3>Specifika</h3>
			<table>
				<tr><td>Viti</td><td>2015</td></tr>
				<tr><td>Motori</td><td>2.0 Diesel</td></tr>
				<tr><td>Transmisioni</td><td>Automatik</td></tr>
				<tr><td>Fuqia</td><td>184 PS</td></tr>
			</table>
		</div>

		<div class="card">
			<h3>Përshkrimi</h3>
			<p>
			Makinë shumë e ruajtur, pa aksidente, e servisuar rregullisht.
			Komoditet dhe performancë e lartë.
			Gati për përdorim.
			</p>
		</div>

	</div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" onclick="this.style.display='none'">
	<img id="lightImg">
</div>

<!-- BUTTON -->
<a href="contact.html" class="sticky-btn">Kontakto Tani</a>

<script>
function openImg(img){
	document.getElementById("lightImg").src = img.src;
	document.querySelector(".lightbox").style.display = "flex";
}
</script>

</body>
</html>
