<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kontakt</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
}

/* CONTACT SECTION */
.contact-section{
    max-width:600px;
    margin:60px auto;
    padding:30px;
    background:#020617;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
    text-align:center;
}

/* TITLE */
.contact-section h2{
    margin-bottom:10px;
}

/* PHONE */
.contact-info{
    margin-bottom:20px;
    font-size:14px;
    color:#94a3b8;
}

.contact-info strong{
    color:#22c55e;
}

/* FORM */
.contact-form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* INPUTS */
.contact-form input,
.contact-form textarea{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
    font-size:14px;
}

.contact-form input:focus,
.contact-form textarea:focus{
    outline:2px solid #22c55e;
}

/* BUTTON */
.contact-form button{
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.contact-form button:hover{
    background:#16a34a;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#020617;
    margin-top:40px;
}

/* SOCIAL */
.socials{
    margin-top:10px;
}

.socials a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.socials a:hover{
    color:#22c55e;
}
</style>

</head>

<body>

<section class="contact-section">
    <h2>Na Kontaktoni</h2>

    <div class="contact-info">
        📞 Telefon: <strong>"+383 49 999 991"</strong><br>
        📍 Auto Sumea, Kosovë
    </div>

    <form class="contact-form">
        <input type="text" placeholder="Emri juaj" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Subjekti">
        <textarea rows="5" placeholder="Mesazhi juaj..." required></textarea>
        <button type="submit">Dërgo Mesazhin</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 Auto Sumea</p>

    <div class="socials">
        <a href="https://www.facebook.com/AutoSumeja/">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="049 999 991">WhatsApp</a>
    </div>
</footer>

</body>
</html>
