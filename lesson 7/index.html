<!DOCTYPE html>
<html>
<head>
	<title>Lesson 7</title>
</head>
<body>
	<form>
		<fieldset>
		<label for="firstname">First name</label><br>
		<input type="text" name="firstname"></input><br>
		
		<label for="lastname">Last name</label><br>
		<input type="text" name="lastname" id="lastname"><br>
		
		<label for="email">Email<label><br>
		<input type="email" name="email"id="email"required><br>
		
		<label for="password">Password</label><br>
		<input type="password" name="password"size="100"placeholder="your password"><br>
		
		<label>Gender</label><br>
		<input type="radio" name="gender"id="female"value="female">
		<label for="female">Female</label><br>
		
		<input type="radio" name="gender"id="male"value="male">
		<label for="male">male</label><br>
		
		<label>Hpbbies</label><br>
		
		<input type="checkbox" name="gaming"id="gaming"value="Gaming">
		<label for="gaming">Gaming</label><br>
		
		<input type="checkbox" name="reading"id="reading"value="reading">
		<label for="reading">Reading</label><br>

		<input type="checkbox" name="running"id="running"value="running">
		<label for="running">Running</label><br>

		<label for="pets">Chose a pet</label>
		<select name="pets"id="pets"></select>
			<option value="dog">Dog</option>
			<option value="cat">Cat</option>
			<option value="monkey">Monkey</option>
			<textarea name="message"id="message"rows="19"cols="20"></textarea>

		<input type="submit" name="submit"><br>
	</fieldset>
	</form>
</body>
</html>
