<!DOCTYPE html>
<html>
<head>
	<title>Lesson 8</title>
</head>
<body>

	<h1>HTML SVG, Multi-page</h1>

	
	<h2>SVG</h2>
	<p>SVG = Scalable Vector Graphics</p>

	<svg width="100px" height="100px">
		<circle cx="50" cy="50" r="40" fill="yellow" stroke="green" stroke-width="5"/>
	</svg>

	<svg width="400px" height="100px">
		<rect width="400px" height="100px" style="fill: rgb(255,0,255);stroke: #000000; stroke-width: 50px;" />
	</svg>

	<svg width="300" height="200">
		<rect x="50" y="30" rx="20" ry="20" width="150px" height="150px" />
	</svg>

	<svg width="300" height="200">
		<polygon points="100, 10 40, 198 190, 78 10, 78 160, 198" fill="blue" fill-rule="evenodd" stroke="lime" stroke-width="5"/>
	</svg>

</body>
</html>
