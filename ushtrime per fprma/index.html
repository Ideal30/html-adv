		<!DOCTYPE html>
		<html lang="sq">
<head>
	<meta charset="UTF-8">
	<title>Contact Form</title>

	<style>
   		 body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        width: 320px;
    }

   	 h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: bold;
        color: #555;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
    }

    input:focus, textarea:focus {
        border-color: #2575fc;
        box-shadow: 0 0 5px rgba(37,117,252,0.5);
    }

    textarea {
        resize: none;
    }

    .submit-btn {
        width: 100%;
        background: #2575fc;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .submit-btn:hover {
        background: #1a5edb;
    }
</style>

</head>

<body>

<div class="form-container">
    <h1>Contact Form</h1>

    <form>
        <label for="firstname">First name</label>
        <input type="text" name="firstname" id="firstname" required>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>

        <label for="message">Për ndonjë mesazh shkruaj këtu</label>
        <textarea name="message" id="message" rows="5"></textarea>

        <input type="submit" value="Dërgo" class="submit-btn">
        
        <input type="checkbox"name="bllokim te website"id="bllokim te website"value="bllokim te website">
        <input type="checkbox" name="porosit e gabuara"id="porosit e gabuara"value="porosit e gabuara">
		
        <label for="porosit e gabuara">porosit e gabuara</label><br>
    
        </form>
</div>

</body>
